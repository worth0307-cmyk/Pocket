<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pocket · 链上钱包跟踪</title>
<style>
  :root {
    --bg: #f5f6fa; --card: #fff; --border: #ececf1; --text: #13141a; --muted: #82838f; --muted-2: #aeb0ba;
    --accent: #ff6034; --accent-2: #ff8a5b; --accent-soft: #fff1ec; --green: #2ebd85; --red: #e8534b;
    --swap: #8b5cf6; --blue: #3b82f6; --orange: #f5a623; --shadow: 0 1px 2px rgba(20,21,26,.04), 0 10px 30px rgba(20,21,26,.06);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.55 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  code, .mono { font-family: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 26px; height: 62px;
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; letter-spacing: -.2px; }
  .logo .mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-weight: 900; box-shadow: 0 4px 12px rgba(255,96,52,.35); }
  .logo small { color: var(--muted); font-weight: 500; font-size: 12px; }
  header .hint { color: var(--muted); font-size: 12px; }
  .container { max-width: none; margin: 0 auto; padding: 22px 24px 60px; }  /* 吃满全宽，留白让给内容 */
  .hero { margin-bottom: 24px; }
  .search { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
    padding: 10px 10px 10px 18px; display: flex; align-items: center; gap: 12px; }
  .search .ic { color: var(--muted-2); font-size: 18px; }
  .search input { flex: 1; height: 46px; border: none; outline: none; background: transparent; font-size: 15px; color: var(--text); }
  .search input::placeholder { color: var(--muted-2); }
  .detect { font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 8px; white-space: nowrap; background: #f0f1f4; color: var(--muted); }
  .detect.ok { background: var(--accent-soft); color: var(--accent); }
  button { height: 46px; padding: 0 20px; border: none; border-radius: 11px; font: inherit; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 6px 16px rgba(255,96,52,.28); }
  .btn-primary:hover { filter: brightness(1.04); }
  .btn-ghost { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .hint-line { color: var(--orange); font-size: 12.5px; margin: 9px 4px 0; min-height: 16px; }
  .grid { display: grid; grid-template-columns: 430px minmax(0, 1fr); gap: 24px; align-items: start; }  /* 清单列拉宽 */
  @media (max-width: 1280px) { .grid { grid-template-columns: 350px minmax(0, 1fr); } }
  @media (max-width: 920px) { .grid { grid-template-columns: minmax(0, 1fr); } }  /* minmax(0,·)：别让宽表格把单列撑爆 */
  /* 移动端适配：搜索栏换行、收紧留白、详情头允许换行、隐藏次要信息 */
  @media (max-width: 700px) {
    .container { padding: 14px 12px 40px; }
    header { padding: 0 14px; height: auto; min-height: 54px; flex-wrap: wrap; }
    header .hint { display: none; }
    .logo small { display: none; }
    .search { flex-wrap: wrap; padding: 10px 12px; }
    .search input { flex: 1 1 100%; height: 40px; order: -1; }
    .search .detect { font-size: 11px; }
    .search button { height: 38px; padding: 0 14px; flex: 1; }
    .det-head { flex-wrap: wrap; padding: 14px; }
    .det-head .total { text-align: left; width: 100%; }
    .det-head .total .big { font-size: 22px; }
    .tabs { flex-wrap: wrap; padding: 10px 12px 0; }
    .tabbar-right { flex-wrap: wrap; margin-left: 0; row-gap: 4px; }
    .stat { padding: 12px; } .stat .v { font-size: 16px; }
    .modal-bg { padding: 12px 6px; }
  }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
    margin: 4px 2px 12px; display: flex; justify-content: space-between; }
  .section-title .count { color: var(--accent); }
  .wcard { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex;
    align-items: center; gap: 12px; cursor: pointer; margin-bottom: 12px; box-shadow: var(--shadow); transition: border-color .15s; }
  .wcard:hover { border-color: var(--accent-2); }
  .wdel { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 7px; display: grid; place-items: center;
    color: var(--muted-2); background: #fff; border: 1px solid var(--border); cursor: pointer; opacity: 0; transition: opacity .12s, color .12s, border-color .12s; }
  .wcard:hover .wdel { opacity: 1; }
  .wdel:hover { color: var(--red); border-color: #f3b4b4; background: #fdecec; }
  .wmove { position: absolute; bottom: 6px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .wcard:hover .wmove { opacity: 1; }
  /* 触屏设备没有 hover：删除/置顶/上下移常显，否则永远点不到 */
  @media (hover: none) { .wdel, .wmove { opacity: .85; } }
  .wmove span { width: 22px; height: 20px; display: grid; place-items: center; font-size: 12px; border: 1px solid var(--border);
    border-radius: 6px; background: #fff; color: var(--muted); cursor: pointer; user-select: none; }
  .wmove span:hover { color: var(--accent); border-color: var(--accent-2); }
  .wmove span.on { color: var(--accent); border-color: #ffd9cc; background: var(--accent-soft); }
  .pin-mark { font-size: 11px; }
  .wcard.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .avatar { width: 42px; height: 42px; border-radius: 50%; flex: 0 0 42px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px; position: relative; }
  .wbadge { position: absolute; top: -5px; right: -7px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px;
    background: #fa5151; color: #fff; font-size: 11px; font-weight: 700; line-height: 18px; text-align: center;
    border: 2px solid var(--card); box-sizing: content-box; z-index: 2; }
  .wcard .info { flex: 1; min-width: 0; }
  .wcard .info .nm { font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .wcard .info .ad { color: var(--muted); font-size: 12px; }
  .wcard .bal { text-align: right; }
  .wcard .bal .v { font-weight: 800; }
  .wcard .bal .s { color: var(--muted); font-size: 11px; }
  .chip { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 6px; text-transform: uppercase; background: var(--accent-soft); color: var(--accent); letter-spacing: .4px; }
  .tier { font-size: 10.5px; font-weight: 800; padding: 1px 7px; border-radius: 999px; white-space: nowrap; }
  .tier-whale { background: #ece4ff; color: #6b3fd4; }
  .tier-superwhale { background: #dcecff; color: #2563eb; }
  .tier-shark { background: #ffe6d6; color: #e0640f; }
  .tier-dolphin { background: #d5f1fb; color: #0e86c4; }
  .tier-fish { background: #e2f6e8; color: #1f9d57; }
  .tier-shrimp { background: #f0f1f4; color: #82838f; }
  .x { margin-left: 6px; color: var(--muted-2); font-size: 12px; padding: 2px 6px; border-radius: 6px; }
  .x:hover { color: var(--red); background: #fdecec; }
  .empty { color: var(--muted); text-align: center; padding: 30px 12px; background: var(--card); border: 1px dashed var(--border); border-radius: 14px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
  .det-head { display: flex; align-items: center; gap: 14px; padding: 20px; border-bottom: 1px solid var(--border); }
  .det-head .info { flex: 1; min-width: 0; }
  .det-head .nm { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .det-head .ad { color: var(--muted); font-size: 12.5px; word-break: break-all; }
  .copy-ic { cursor: pointer; color: var(--muted-2); margin-left: 6px; display: inline-flex; vertical-align: middle; }
  .copy-ic:hover { color: var(--accent); }
  .edit-ic { cursor: pointer; color: var(--muted-2); margin-left: 6px; display: inline-flex; vertical-align: middle; }
  .edit-ic:hover { color: var(--accent); }
  .det-head .total { text-align: right; }
  .det-head .total .big { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
  .det-head .total .sub { font-size: 12px; color: var(--muted); }
  .chain-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: #fafbfd; align-items: center; }
  .chain-tab { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 8px; cursor: pointer; color: var(--muted); border: 1px solid var(--border); background: #fff; }
  .chain-tab:hover { border-color: var(--accent-2); color: var(--accent); }
  .chain-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chain-tab .u { font-weight: 800; margin-left: 4px; }
  .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: var(--border); }
  @media (max-width: 620px) { .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .stat { background: var(--card); padding: 16px 18px; min-width: 0; }
  .stat .v { overflow-wrap: anywhere; }
  .stat .k { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .stat .v { font-size: 20px; font-weight: 800; margin-top: 3px; }
  .stat .v small { font-size: 12px; color: var(--muted); font-weight: 600; }
  .help { color: var(--muted-2); cursor: help; border: 1px solid var(--border); border-radius: 50%; width: 14px; height: 14px; display: inline-grid; place-items: center; font-size: 10px; }
  .tabs { display: flex; gap: 4px; padding: 12px 18px 0; border-bottom: 1px solid var(--border); }
  .tab { padding: 9px 14px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tabbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; padding-bottom: 8px; color: var(--muted); font-size: 12px; }
  .switch { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .refresh-btn { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 10px 18px; border-bottom: 1px solid var(--border); font-weight: 700; }
  td { padding: 13px 18px; border-bottom: 1px solid #f3f4f7; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafd; }
  .badge { font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 8px; white-space: nowrap; }
  .b-BUY { color: var(--green); background: rgba(46,189,133,.12); }
  .b-SELL { color: var(--red); background: rgba(232,83,75,.12); }
  .b-SWAP { color: var(--swap); background: rgba(139,92,246,.12); }
  .b-TRANSFER_IN { color: var(--blue); background: rgba(59,130,246,.12); }
  .b-TRANSFER_OUT { color: var(--orange); background: rgba(245,166,35,.14); }
  .b-OTHER { color: var(--muted); background: #f0f1f4; }
  .b-open-long { color: var(--green); background: rgba(46,189,133,.12); }
  .b-close-long { color: var(--orange); background: rgba(245,166,35,.16); }
  .b-open-short { color: var(--red); background: rgba(232,83,75,.12); }
  .b-close-short { color: var(--blue); background: rgba(59,130,246,.12); }
  .usd { color: var(--muted); font-weight: 600; }
  .amt-cell { font-weight: 700; white-space: nowrap; }
  .t-time { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .pf-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #f3f4f7; }
  .pf-row:last-child { border-bottom: none; }
  .coin { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 11px; flex: 0 0 32px; }
  .pf-row .sym { font-weight: 700; flex: 1; min-width: 0; }
  .pf-row .sym .sub2 { color: var(--muted); font-size: 12px; font-weight: 500; }
  .pf-row .amt { text-align: right; }
  .pf-row .amt .v { font-weight: 800; }
  .pf-row .amt .u { color: var(--muted); font-size: 12px; }
  .summary-block { border-bottom: 8px solid var(--bg); }
  .summary-head { padding: 11px 18px; font-weight: 700; color: var(--muted); font-size: 12px; letter-spacing: .4px; background: #fafbfd; border-bottom: 1px solid var(--border); }
  .hl-block { border-bottom: 8px solid var(--bg); }
  .hl-head { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px; font-weight: 800; background: #eefaf6; border-bottom: 1px solid var(--border); }
  .hl-head .hl-val { color: var(--muted); font-weight: 700; font-size: 13px; }
  .th-filter { font: inherit; font-size: 11px; padding: 1px 3px; border: 1px solid var(--border); border-radius: 5px; background: #fff; color: var(--muted); cursor: pointer; margin-left: 3px; max-width: 88px; vertical-align: middle; }
  .th-sort { cursor: pointer; color: var(--muted-2); margin-left: 4px; user-select: none; font-size: 12px; }
  .th-sort:hover, .th-sort.on { color: var(--accent); }
  .scroll-area { max-height: 520px; overflow: auto; }
  .scroll-sm { max-height: 340px; overflow: auto; }
  #walletList { padding-right: 2px; }
  .scroll-area th, .scroll-sm th { position: sticky; top: 0; background: #fff; z-index: 1; }
  .note { color: var(--muted); font-size: 12.5px; padding: 16px 18px; }
  .spinner { color: var(--muted); padding: 26px; text-align: center; }
  .modal-bg { position: fixed; inset: 0; background: rgba(20,21,26,.45); display: none; align-items: flex-start; justify-content: center; z-index: 100; padding: 40px 16px; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 1180px; max-height: 86vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 800; }
  .modal-head .ctrls { display: flex; align-items: center; gap: 8px; font-weight: 400; }
  .modal-body { overflow: auto; }
  .modal-body table { width: 100%; }
  .modal-body th { position: sticky; top: 0; background: #fff; z-index: 1; }
  .modal-foot { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-top: 1px solid var(--border); }
  .lb-h { cursor: pointer; user-select: none; white-space: nowrap; }
  .lb-h:hover, .lb-h.on { color: var(--accent); }
  .lb-clear { background: #fff; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; height: 26px; padding: 0 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .lb-clear:hover { color: var(--red); border-color: #f3b4b4; background: #fdecec; }
  .an-btn { background: var(--accent-soft); color: var(--accent); border: 1px solid #ffd9cc; border-radius: 8px; height: 26px; padding: 0 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .an-btn:hover { filter: brightness(.97); }
  .wsel { width: 16px; height: 16px; cursor: pointer; flex: 0 0 auto; accent-color: var(--accent); }
  .list-tools { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 2px 12px; }
  .tool-btn { background: #fff; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; height: 28px; padding: 0 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .tool-btn:hover { color: var(--accent); border-color: var(--accent-2); }
  .tool-btn.danger:hover { color: var(--red); border-color: #f3b4b4; background: #fdecec; }
  .an-filter { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); }
  .an-fl { display: flex; align-items: center; gap: 8px; }
  .an-fl-k { font-size: 12px; color: var(--muted); font-weight: 700; }
  .an-cats { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip-c { cursor: pointer; font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 999px; background: #f1f2f5; color: var(--muted); border: 1px solid transparent; }
  .chip-c:hover { color: var(--accent); }
  .chip-c.on { background: var(--accent-soft); color: var(--accent); border-color: #ffd9cc; }
  .th-multi { position: relative; display: inline-block; }
  .th-btn { display: inline-block; font-size: 12px; font-weight: 700; color: var(--muted); background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; user-select: none; }
  .th-btn:hover { color: var(--accent); border-color: var(--accent-2); }
  .th-menu { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30; background: #fff; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); padding: 8px; min-width: 190px; max-height: 300px; overflow: auto; }
  .th-menu .cat-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .th-menu .cat-row span { cursor: pointer; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: #f1f2f5; color: var(--muted); }
  .th-menu .cat-row span:hover { background: var(--accent-soft); color: var(--accent); }
  .th-menu .mg { font-size: 10.5px; font-weight: 800; color: var(--muted-2); text-transform: uppercase; letter-spacing: .5px; margin: 6px 2px 3px; }
  .th-menu label { display: flex; align-items: center; gap: 7px; font-size: 12.5px; padding: 3px 4px; cursor: pointer; border-radius: 6px; white-space: nowrap; }
  .th-menu label:hover { background: var(--bg); }
  .th-menu label input { accent-color: var(--accent); }
  .lb-untrack { color: var(--red); cursor: pointer; font-weight: 700; }
  .lb-untrack:hover { text-decoration: underline; }
  .lb-close { cursor: pointer; color: var(--muted); font-size: 18px; padding: 0 4px; }
  .lb-close:hover { color: var(--red); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid var(--border);
    padding: 11px 18px; border-radius: 12px; box-shadow: var(--shadow); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 50; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="mark">P</span> Pocket <small>· 链上钱包跟踪</small></div>
    <div style="display:flex;align-items:center;gap:14px">
      <button class="btn-ghost" style="height:36px;padding:0 14px" onclick="openLeaderboard()">🏆 HL 排行榜</button>
      <div class="hint mono" id="chainStatus"></div>
    </div>
  </header>
  <div class="container">
    <div class="hero">
      <div class="search">
        <span class="ic">🔍</span>
        <input id="address" placeholder="粘贴任意钱包地址，自动识别链（0x… / Solana / bc1…）" autocomplete="off"
               oninput="onAddrInput()" onkeydown="if(event.key==='Enter')queryAddress(false)" />
        <span class="detect" id="detect">等待输入</span>
        <button class="btn-ghost" onclick="queryAddress(false)">查询</button>
        <button class="btn-primary" onclick="queryAddress(true)">+ 跟踪</button>
      </div>
      <div class="hint-line" id="addrHint"></div>
    </div>
    <div class="grid">
      <div>
        <div class="section-title"><span>跟踪清单 <span class="count" id="wcount"></span></span>
          <span style="display:flex;gap:8px">
            <button class="an-btn" id="analyzeBtn" onclick="analyzeSelected()" style="display:none"></button>
          </span></div>
        <div class="list-tools" id="listTools">
          <button class="tool-btn need-wallets" id="selAllBtn" onclick="toggleSelectAll()">全选</button>
          <select class="th-filter need-wallets" id="tierFilter" style="max-width:none;font-size:12px;height:28px" onchange="setListTier(this.value)" title="按账户级别筛选清单">
            <option value="">全部等级</option>
            <option value="巨鲸">🐳 巨鲸</option><option value="超大户">🐋 超大户</option><option value="大户">🦈 大户</option>
            <option value="中户">🐬 中户</option><option value="小户">🐟 小户</option><option value="散户">🦐 散户</option>
          </select>
          <button class="tool-btn" onclick="triggerImport()">导入</button>
          <button class="tool-btn need-wallets" onclick="exportWallets()">导出</button>

async function api(path, opts={}){

function copyText(t, ev){ if(ev) ev.stopPropagation();

function fallbackCopy(t,done){ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");done();}catch(e){} document.body.removeChild(ta); }

function usd(x){ if(x==null) return "—"; const s=x<0?"-":""; const a=Math.abs(x); if(a>=1e9) return s+"$"+(a/1e9).toFixed(2)+"B"; if(a>=1e6) return s+"$"+(a/1e6).toFixed(2)+"M"; return s+"$"+a.toLocaleString(undefined,_D2); }
function price(x){ if(x==null) return "—"; const a=Math.abs(x); if(a>=1) return "$"+x.toLocaleString(undefined,_D2); if(a===0) return "$0.00"; return "$"+(+x.toPrecision(2)); }
function ago(ts){ if(!ts) return ""; const s=Math.floor(Date.now()/1000-ts); if(s<60)return s+"s"; if(s<3600)return Math.floor(s/60)+"m"; if(s<86400)return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d"; }
function fmtDate(ts){ if(!ts) return ""; const d=new Date(ts*1000); const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function hashHue(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%360; }
function avatarStyle(a){ const h=hashHue(a||""); return `background:linear-gradient(135deg,hsl(${h},75%,58%),hsl(${(h+50)%360},75%,52%))`; }

function firstUsableEvm(){ return EVM_CHAINS.find(chainUsable) || "eth"; }

function detectCategory(addr){
  addr=addr.trim(); if(!addr) return null;
  if(/^0x[0-9a-fA-F]{40}$/.test(addr)) return "evm";
  if(/^(bc1|tb1)[0-9a-z]{8,}$/i.test(addr)) return "btc";
  if(/^[13][a-km-zA-HJ-NP-Z1-9]{24,34}$/.test(addr)) return "btc";
  if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(addr)) return "sol";
  return null;
}
function onAddrInput(){
  const v=document.getElementById("address").value.trim();
  const chip=document.getElementById("detect"), hint=document.getElementById("addrHint");
  const cat=detectCategory(v);
  if(!v){ chip.textContent="等待输入"; chip.className="detect"; hint.textContent=""; return; }
  if(!cat){ chip.textContent="无法识别"; chip.className="detect"; hint.textContent=""; return; }
  chip.textContent="识别：" + CAT_LABEL[cat] + (cat==="evm"?"（多链聚合）":""); chip.className="detect ok";
  hint.textContent = (cat==="evm" && !anyEvmUsable()) ? "⚠️ 这是 EVM 地址，请在 .env 配置免费的 ETHERSCAN_API_KEY。" : "";
}

async function fillCard(w){
  const el=document.getElementById("wbal-"+w.id); if(!el) return;
  const pel=document.getElementById("wpnl-"+w.id);
  const key=w.chain+":"+w.address;
  const c=cardCache[key];
  if(c && Date.now()-c.ts<60000){ el.textContent=c.text; if(pel) pel.innerHTML=c.pnl; const tel=document.getElementById("wtier-"+w.id); if(tel) tel.innerHTML=tierBadge(c.usd); return; }
  try{
    if(EVM_CHAINS.includes(w.chain)){
      let total=0, have=false, upnl=0, pnlType='';
      if(MORALIS){ try{ const n=await api(`/api/networth?address=${w.address}`); total+=n.total_usd; have=true; }catch(e){} }
      try{ const hh=await api(`/api/hyperliquid?address=${w.address}&fills=1&summary=1`); if(hh){ if(hh.total_usd){ total+=hh.total_usd; have=true; }
        if(hh.unrealized_pnl){ upnl=hh.unrealized_pnl; pnlType='浮'; } else if(hh.realized_pnl){ upnl=hh.realized_pnl; pnlType='实'; } } }catch(e){}
      let text, usdVal=have?total:null;
      if(have){ text=usd(total); el.textContent=text; }
      else { const b=await api(`/api/balance?chain=${w.chain}&address=${encodeURIComponent(w.address)}`); text=fmt(b.native_amount)+" "+b.native_symbol; el.textContent=text; }
      const pnl = upnl ? `<span class="${upnl>=0?'pos':'neg'}">${pnlType} ${(upnl>=0?'+':'')+usd(upnl)}</span>` : "总值";
      if(pel) pel.innerHTML=pnl;
      const tel=document.getElementById("wtier-"+w.id); if(tel) tel.innerHTML=tierBadge(usdVal);
      cardCache[key]={text, pnl, usd:usdVal, ts:Date.now()};
    } else {
      const b=await api(`/api/balance?chain=${w.chain}&address=${encodeURIComponent(w.address)}`);
      const usdVal=b.extra&&b.extra.total_usd!=null?b.extra.total_usd:null;

      cardCache[key]={text, pnl:"总值", usd:usdVal, ts:Date.now()};
    }
  }catch(e){ el.textContent="—"; }
}

const _portGood=v=>v&&!v.__err&&v.tokens; const _balGood=v=>v&&!v.__err;
async function loadAll(cur){
  cur=cur||sel; if(!cur) return; const tag=JSON.stringify(cur);
  const isEvm = cur.category==="evm", isEvmM = isEvm && MORALIS;
  const addr=encodeURIComponent(cur.address);
  if(isEvmM){
    cache.bal=null;
    // HL 与持仓并发起飞；持仓先到即渲染，随后只对有余额的链查买卖
    const pHl=api(`/api/hyperliquid?address=${addr}&fills=1`).then(d=>cache.hl=d).catch(()=>{});
    try{ cache.port=await api(`/api/portfolio?address=${addr}`); }catch(e){ if(!_portGood(cache.port)) cache.port={__err:e.message}; }
    if(JSON.stringify(sel)!==tag) return;
    cache.updated=Date.now(); renderDetail();
    await Promise.all([ pHl, loadStreamInto(cur) ]);
  } else {
    cache.port=null;
    const tasks=[ api(`/api/balance?chain=${cur.chain}&address=${addr}`).then(d=>cache.bal=d).catch(e=>{ if(!_balGood(cache.bal)) cache.bal={__err:e.message}; }) ];
    if(isEvm){ tasks.push(api(`/api/hyperliquid?address=${addr}&fills=1`).then(d=>cache.hl=d).catch(()=>{})); } else cache.hl=null;
    tasks.push(loadStreamInto(cur));
    await Promise.all(tasks);
  }
  if(JSON.stringify(sel)!==tag) return;
  cache.updated=Date.now(); renderDetail();
  const dkeys=Object.keys(detailCache);  // 快照上限 20 个，先淘汰最旧，防内存无限增长
  if(dkeys.length>=20){ let old=dkeys[0]; for(const k of dkeys) if(detailCache[k].ts<detailCache[old].ts) old=k; delete detailCache[old]; }
  detailCache[detailKey(cur)]={ snap:{port:cache.port,bal:cache.bal,hist:cache.hist,pnl:cache.pnl,swaps:cache.swaps,hl:cache.hl}, ts:Date.now() };
}
async function loadStreamInto(cur){
  if(cur.category==="evm" && MORALIS){
    cache.hist=null; cache.pnl=null;
    const ac=activeChains().join(",");  // 只查有余额/常用的链
    try{ cache.swaps=await api(`/api/swaps?address=${encodeURIComponent(cur.address)}&chains=${ac}&limit=20`); }
    catch(e){ if(!(cache.swaps&&cache.swaps.swaps)) cache.swaps={__err:e.message}; }
    return;
  }
  cache.swaps=null;
  const q=`chain=${cur.chain}&address=${encodeURIComponent(cur.address)}`;
  const [h,p]=await Promise.allSettled([api(`/api/history?${q}&limit=40`), api(`/api/pnl?${q}&limit=50`)]);
  if(h.status==="fulfilled") cache.hist=h.value; else if(!(cache.hist&&!cache.hist.__err)) cache.hist={__err:h.reason&&h.reason.message};
  if(p.status==="fulfilled") cache.pnl=p.value; else if(!(cache.pnl&&cache.pnl.available)) cache.pnl={available:false};
}

function renderDetail(){
  if(inAnalysis) return;  // 分析模块占用详情区时，不被后台行情刷新覆盖
  if(!sel) return;
  const isEvmM = sel.category==="evm" && MORALIS;
  const port=cache.port, b=cache.bal, h=cache.hist;

  const isEvm = sel.category==="evm";
  const evmSwaps=(cache.swaps && cache.swaps.swaps) ? cache.swaps.swaps.map(s=>({...s, venue:s.chain})) : [];
  const hlFills=(cache.hl && cache.hl.fills) ? cache.hl.fills : [];
  const merged=[...evmSwaps, ...hlFills].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
  const fmerged = chainFilter ? merged.filter(x=>x.venue===chainFilter) : merged;
  const rollup = isEvm ? coinRollup(fmerged) : [];
  const stats = isEvm ? swapStats(fmerged)
    : (cache.pnl&&cache.pnl.available ? {buys:cache.pnl.buys,sells:cache.pnl.sells,realized_pnl_usd:cache.pnl.realized_pnl_usd,window:cache.pnl.window} : null);

  let walletUsd=null, nativeStr="—", tokenCount=null;
  if(isEvmM && port && !port.__err){ walletUsd=port.total_usd; tokenCount=(port.tokens||[]).length; }
  else if(b && !b.__err){ walletUsd=b.extra?b.extra.total_usd:null; nativeStr=`${fmt(b.native_amount)} ${esc(b.native_symbol)}`; }
  const hlUsd = cache.hl&&cache.hl.total_usd ? cache.hl.total_usd : 0;
  const totalUsd = (walletUsd!=null||hlUsd>0) ? (walletUsd||0)+hlUsd : null;

  const realized = stats? stats.realized_pnl_usd : null;
  const hasTrades = stats && (stats.buys||stats.sells);

    <td><span class="badge ${p.side==='多'?'b-BUY':'b-SELL'}">${p.side}${p.leverage?` ${p.leverage}x`:''}</span></td>

    <td>${pctCell}</td>

// 按币种汇总成交，并结合当前持仓/现价计算浮动盈亏(HL 用真实值，EVM 用现价估算)
function coinRollup(list){
  const m={};
  (list||[]).forEach(t=>{
    const k=t.token_symbol||'?';
    const g=m[k]||(m[k]={coin:k,buys:0,sells:0,buyAmt:0,sellAmt:0,buyVal:0,sellVal:0,realized:0,venue:''});
    if(!g.venue) g.venue=t.venue||'';
    if(t.type==="BUY"){ g.buys++; g.buyAmt+=t.token_amount; g.buyVal+=t.value_usd; }
    else { g.sells++; g.sellAmt+=t.token_amount; g.sellVal+=t.value_usd; }
    if(t.closed_pnl!=null) g.realized+=t.closed_pnl;
  });
  const pos={}; ((cache.hl&&cache.hl.positions)||[]).forEach(p=>pos[p.coin]=p);
  const portMap={}; ((cache.port&&cache.port.tokens)||[]).forEach(t=>{ portMap[(t.symbol||'').toUpperCase()]=t; });
  const mids=(cache.hl&&cache.hl.mids)||{};
  Object.keys(pos).forEach(c=>{ if(!m[c]) m[c]={coin:c,buys:0,sells:0,buyAmt:0,sellAmt:0,buyVal:0,sellVal:0,realized:0,venue:'HL'}; });
  const rows=Object.values(m).map(g=>{
    const p=pos[g.coin]; const pt=portMap[(g.coin||'').toUpperCase()];
    const avg = p ? p.entry_px : (g.buyAmt>0 ? g.buyVal/g.buyAmt : null);
    let cur=null, posVal=null, upnl=null, isHL=false, side='';
    if(p){ isHL=true; side=p.side; cur=(p.size? p.value_usd/Math.abs(p.size) : p.entry_px); posVal=p.value_usd; upnl=p.unrealized_pnl; }
    else if(pt){ cur=(pt.price!=null?pt.price:null); posVal=(pt.usd_value!=null?pt.usd_value:null);
      if(avg!=null && cur!=null && pt.amount) upnl=(cur-avg)*pt.amount; }  // EVM 浮盈估算=(现价-买入均价)×持仓
    if(cur==null && mids[g.coin]!=null) cur=mids[g.coin];  // 已平仓的币用盘口价兜底显示现价
    const venue = isHL ? 'HL' : (g.venue || (pt?pt.chain:'') || '');
    return { coin:g.coin, buys:g.buys, sells:g.sells, net:g.buyAmt-g.sellAmt, realized:g.realized, avg, cur, posVal, upnl, isHL, side, venue };
  });
  rows.sort((a,b)=> (Math.abs(b.posVal||0)+b.buys+b.sells) - (Math.abs(a.posVal||0)+a.buys+a.sells));
  return rows;
}

      <td>${g.realized?`<span class="${g.realized>=0?'pos':'neg'}">${(g.realized>=0?'+':'')+usd(g.realized)}</span>`:'—'}</td></tr>`;
  }).join("");
  return `<div class="summary-block"><div class="summary-head">币种汇总</div>

      <th>现价 ${ss('cur')}</th><th>持仓金额 ${ss('pos')}</th><th>占比 ${ss('pct')}</th><th>浮动盈亏 ${ss('upnl')}</th><th>已实现盈亏 ${ss('realized')}</th>
    </tr></thead><tbody>${trs}</tbody></table></div></div>`;

function tradeBadge(s){
  const d=s.dir||"";
  if(/open\s*long/i.test(d)) return {t:"开多",c:"b-open-long"};
  if(/close\s*long/i.test(d)) return {t:"平多",c:"b-close-long"};
  if(/open\s*short/i.test(d)) return {t:"开空",c:"b-open-short"};
  if(/close\s*short/i.test(d)) return {t:"平空",c:"b-close-short"};
  return s.type==="BUY" ? {t:"买入",c:"b-BUY"} : {t:"卖出",c:"b-SELL"};
}
function renderTrades(list, err, total){
  if(!list || !list.length){
    if(err) return `<div class="note">买卖查询失败：${esc(err)}</div>`;
    if(cache.hl && cache.hl.fills_error && chainFilter!=='HL')
      return `<div class="note">⚠️ Hyperliquid 成交记录读取超时/失败（大户成交量大、跨境访问不稳定），并非真的没有交易。点右上「刷新」重试。</div>`;
    return `<div class="note">该钱包近期没有买卖记录${chainFilter?`（${chainFilter==='HL'?'Hyperliquid':chainFilter.toUpperCase()}）`:"（EVM DEX 与 Hyperliquid 均无）"}。</div>`;
  }
  const types=[...new Set(list.map(s=>tradeBadge(s).t))];
  const coins=[...new Set(list.map(s=>s.token_symbol||'?'))];
  let shown=list.slice();
  if(typeFilter) shown=shown.filter(s=>tradeBadge(s).t===typeFilter);
  if(coinFilter) shown=shown.filter(s=>(s.token_symbol||'?')===coinFilter);
  if(sortKey){ const k={amount:'token_amount',price:'price_usd',value:'value_usd',time:'timestamp'}[sortKey];
    shown.sort((a,b)=>{ const av=+a[k]||0, bv=+b[k]||0; return sortDir==='desc'?bv-av:av-bv; }); }
  const totalShown=shown.length;
  if(totalShown>500) shown=shown.slice(0,500);  // 高频钱包成交上千条，渲染截断（筛选/排序已先生效）

  const selBox=(cur,onCh,items)=>`<select class="th-filter" onchange="${onCh}(this.value)"><option value="">全部</option>${items.map(t=>`<option value="${esc(t)}" ${cur===t?'selected':''}>${esc(t)}</option>`).join("")}</select>`;
  const sortBtn=(k)=>`<span class="th-sort ${sortKey===k?'on':''}" onclick="setSort('${k}')">${sortKey===k?(sortDir==='desc'?'↓':'↑'):'⇅'}</span>`;

  const rows=shown.map(s=>{
    const bd=tradeBadge(s);
    const venueChip = s.venue==='HL'
      ? `<span class="chip" title="Hyperliquid 永续/现货成交">⚡HL</span>`
      : `<span class="chip">${(s.venue||s.chain||'').toUpperCase()}</span>`;

    return `<tr>
      <td><span class="badge ${bd.c}">${bd.t}</span></td>

      <td class="amt-cell">${fmt(s.token_amount)}</td>

      <td class="amt-cell">${usd(s.value_usd)}${pnl}</td>

      <td class="t-time" title="${ago(s.timestamp)}前">${fmtDate(s.timestamp)}</td>
      <td>${s.explorer_url?`<a href="${s.explorer_url}" target="_blank" rel="noopener">↗</a>`:""}</td></tr>`;
  }).join("");
  const truncNote = totalShown>500 ? `<tr><td colspan="8" class="note">已显示前 500 条（筛选后共 ${totalShown} 条），用「类型/币种」下拉可缩小范围。</td></tr>` : '';

  return staleNote + `<div class="scroll-area"><table><thead><tr>

function renderHistory(h){
  if(!h||h.__err) return `<div class="note">交易查询失败：${esc(h&&h.__err||"未知错误")}</div>`;
  if(h.note) return `<div class="note">${esc(h.note)}</div>`;
  let acts=h.actions||[];
  const spam=new Set((cache.port&&cache.port.spam_contracts)||[]);

function normImportChain(ch,address){ ch=(ch||"").toLowerCase().trim();
  if(EVM_CHAINS.includes(ch)||ch==="sol"||ch==="btc") return ch;
  const cat=detectCategory(address); return cat==="evm"?"eth":cat; }
async function importWallets(input){
  const file=input.files&&input.files[0]; if(!file){ return; }
  try{
    const text=(await file.text()).trim();
    let raw=[];
    if(text.startsWith("[")||text.startsWith("{")){
      const j=JSON.parse(text); const arr=Array.isArray(j)?j:(j.wallets||[]);
      raw=arr.map(x=>({chain:x.chain, address:(x.address||x.addr||"").trim(), label:x.label||""}));
    } else {  // 纯文本/CSV：每行 address 或 address,label
      raw=text.split(/\r?\n/).map(line=>{ const p=line.split(/[,\t]/); return {chain:"", address:(p[0]||"").trim(), label:(p.slice(1).join(",")||"").trim()}; });
    }
    const items=raw.filter(x=>x.address).map(x=>({chain:normImportChain(x.chain,x.address), address:x.address, label:x.label})).filter(x=>x.chain);
    if(!items.length){ toast("文件里没有可导入的地址"); return; }
    const byChain={}; items.forEach(x=>{ (byChain[x.chain]=byChain[x.chain]||[]).push({address:x.address,label:x.label}); });
    let added=0,skipped=0,invalid=0;
    for(const ch of Object.keys(byChain)){
      try{ const r=await api("/api/wallets/batch",{method:"POST",body:JSON.stringify({chain:ch,items:byChain[ch]})}); added+=r.added||0; skipped+=r.skipped||0; invalid+=r.invalid||0; }
      catch(e){ invalid+=byChain[ch].length; }
    }
    toast(`导入完成：新增 ${added}${skipped?`，已存在 ${skipped}`:""}${invalid?`，无效 ${invalid}`:""}`);
    await loadWallets();
  }catch(e){ toast("导入失败："+e.message); }
  finally{ input.value=""; }
}
async function purgeInactive(){
  if(!walletList.length) return toast("清单为空");
  const btn=document.getElementById("purgeBtn");
  if(btn && btn.disabled) return;             // 防连点重复扫描
  if(btn){ btn.disabled=true; btn.textContent="扫描中…"; }
  toast("正在并行扫描无交易地址…");
  let r;
  try{ r=await api("/api/wallets/scan_inactive",{method:"POST"}); }
  catch(e){ return toast("扫描失败："+e.message); }
  finally{ if(btn){ btn.disabled=false; btn.textContent="清理无交易"; } }
  const dead=r.inactive||[];
  if(!dead.length) return toast(`已检查 ${r.checked} 个地址，未发现无交易记录的`);
  const names=dead.slice(0,15).map(w=>(w.label?w.label+" ":"")+shortAddr(w.address,8,6)).join("\n");
  const more=dead.length>15?`\n…等共 ${dead.length} 个`:"";
  if(!confirm(`发现 ${dead.length} 个无交易记录的地址，确认移除？\n（查询失败的已自动保留，不会误删）\n${names}${more}`)) return;
  let n=0; for(const w of dead){ try{ await api("/api/wallets/"+w.id,{method:"DELETE"}); n++; }catch(e){} }
  toast(`已移除 ${n} 个无交易记录的地址`);
  await loadWallets();
}

        <option value="">全部</option><option value="pos" ${lbSign[k]==='pos'?'selected':''}>盈利</option><option value="neg" ${lbSign[k]==='neg'?'selected':''}>亏损</option></select>`;
    }
    return `<th class="lb-h ${lbSort===k?'on':''}" ${LB_COL_TIPS[k]?`title="${LB_COL_TIPS[k]}"`:''} onclick="lbSetSort('${k}')">${label} <span class="th-sort ${lbSort===k?'on':''}">${arrow}</span>${filter}</th>`;
  }).join("");
  const view=lbVisibleRows();
  if(!view.length){ document.getElementById("lbBody").innerHTML=`<table><thead><tr><th>#</th><th></th>${lbTraderTh()}${head}</tr></thead><tbody><tr><td colspan="8" class="note">无符合筛选的记录（当前 ${lbRows.length} 条里按等级/盈亏筛选后为空）</td></tr></tbody></table>`; updateLbCount(); return; }
  const rows=view.map((r,i)=>{
    const tracked=trackedAddrs.has((r.address||'').toLowerCase());
    const nm=customNames[(r.address||'').toLowerCase()]||r.display_name||shortAddr(r.address||'',8,6);
    const effVal=lbEffVal(r), live=lbIsLive(r);
    const valCell = live
      ? `${usd(effVal)}<div style="font-weight:500;font-size:11px;color:var(--muted)" title="已跟踪，显示实测总资产；排行榜快照为 ${usd(r.account_value)}">实时</div>`
      : usd(effVal);
    return `<tr>
      <td>${i+1}</td>
      <td><input type="checkbox" ${tracked?'disabled':''} ${lbSel.has(r.address)?'checked':''} onchange="lbToggle('${r.address}',this.checked)"></td>
      <td><b>${esc(nm)}</b> ${tierBadge(effVal)} <span class="edit-ic" title="重命名" onclick="lbRename('${r.address}')">${EDIT_SVG}</span><div class="mono" style="color:var(--muted);font-size:12px">${shortAddr(r.address||'',8,6)}${tracked?` · <span class="lb-untrack" onclick="lbUntrack('${r.address}')">取消跟踪</span>`:''}</div></td>
      <td class="amt-cell">${valCell}</td>
      ${lbPnlCell(r.day)}${lbPnlCell(r.week)}${lbPnlCell(r.month)}${lbPnlCell(r.allTime)}</tr>`;
  }).join("");
  document.getElementById("lbBody").innerHTML=`<table><thead><tr><th>#</th><th></th>${lbTraderTh()}${head}</tr></thead><tbody>${rows}</tbody></table>`;
  updateLbCount();
}
function lbToggle(addr,on){ if(on) lbSel.add(addr); else lbSel.delete(addr); updateLbCount(); }
function lbToggleAll(on){ lbSel.clear(); if(on) lbVisibleRows().forEach(r=>{ if(!trackedAddrs.has((r.address||'').toLowerCase())) lbSel.add(r.address); }); renderLeaderboard(); }
async function lbUntrack(addr){
  const key=(addr||'').toLowerCase();
  const ws=walletList.filter(x=>(x.address||'').toLowerCase()===key);
  if(!ws.length){ toast("未找到该跟踪记录"); return; }
  try{ for(const w of ws) await api("/api/wallets/"+w.id,{method:"DELETE"}); toast("已取消跟踪"); await loadWallets(); renderLeaderboard(); }
  catch(e){ toast(e.message); }
}
function updateLbCount(){ document.getElementById("lbCount").textContent = lbSel.size?`已选 ${lbSel.size} 个`:""; }
async function importSelected(){
  if(!lbSel.size) return toast("请先勾选地址");
  const byAddr={}; lbRows.forEach(r=>byAddr[r.address]=r);
  const items=[...lbSel].map(a=>({address:a, label:customNames[(a||'').toLowerCase()]||(byAddr[a]&&byAddr[a].display_name)||("HL "+shortAddr(a,4,4))}));
  try{ const r=await api("/api/wallets/batch",{method:"POST",body:JSON.stringify({chain:"eth",items})});
    toast(`已导入 ${r.added} 个${r.skipped?`，跳过 ${r.skipped} 个已存在`:""}${r.invalid?`，${r.invalid} 个无效`:""}`);
    closeLeaderboard(); await loadWallets();
  }catch(e){ toast(e.message); }
}

// 每 60s 轻量刷新未读红圈（只改徽章 DOM，不重建列表、不打余额接口）
async function refreshBadges(){
  if(document.hidden) return;
  try{
    const d=await api("/api/wallets"); walletList=d.wallets;
    d.wallets.forEach(w=>{
      const av=document.querySelector(`.wcard[data-key="${w.chain}:${w.address}"] .avatar`); if(!av) return;
      let b=av.querySelector(".wbadge"); const n=w.unread||0;
      const isOpen = sel && sel.chain===w.chain && sel.address===w.address && !inAnalysis;
      if(n>0 && !isOpen){ if(!b){ b=document.createElement("span"); b.className="wbadge"; av.appendChild(b); } b.textContent=n>99?"99+":n; }
      else if(b) b.remove();
    });
  }catch(e){}
}
(async function init(){
  try{ await loadChains(); await loadWallets(); onAddrInput(); syncListHeight(); }
  catch(e){ document.getElementById("walletList").innerHTML=`<div class="empty">加载失败：${esc(e.message)}</div>`; }
  setInterval(refreshBadges, 60000);
  // 后台预取排行榜(暖 5 分钟缓存)，点开时秒显
  api(`/api/hl_leaderboard?sort=${lbSort}&dir=${lbDir}&limit=25`).then(d=>{ lbRows=d.rows||[]; }).catch(()=>{});
})();
</script>
