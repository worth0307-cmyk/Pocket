<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pocket · 链上钱包跟踪</title>
<style>
  :root {
    --bg: #f5f6fa; --card: #fff; --border: #ececf1; --text: #13141a; --muted: #82838f; --muted-2: #aeb0ba;
    --accent: #ff6034; --accent-2: #ff8a5b; --accent-soft: #fff1ec; --green: #2ebd85; --red: #e8534b;
    --swap: #8b5cf6; --blue: #3b82f6; --orange: #f5a623; --shadow: 0 1px 2px rgba(20,21,26,.04), 0 10px 30px rgba(20,21,26,.06);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.55 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  code, .mono { font-family: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 26px; height: 62px;
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; letter-spacing: -.2px; }
  .logo .mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-weight: 900; box-shadow: 0 4px 12px rgba(255,96,52,.35); }
  .logo small { color: var(--muted); font-weight: 500; font-size: 12px; }
  header .hint { color: var(--muted); font-size: 12px; }
  .container { max-width: 1280px; margin: 0 auto; padding: 26px 26px 60px; }
  .hero { margin-bottom: 24px; }
  .search { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
    padding: 10px 10px 10px 18px; display: flex; align-items: center; gap: 12px; }
  .search .ic { color: var(--muted-2); font-size: 18px; }
  .search input { flex: 1; height: 46px; border: none; outline: none; background: transparent; font-size: 15px; color: var(--text); }
  .search input::placeholder { color: var(--muted-2); }
  .detect { font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 8px; white-space: nowrap; background: #f0f1f4; color: var(--muted); }
  .detect.ok { background: var(--accent-soft); color: var(--accent); }
  button { height: 46px; padding: 0 20px; border: none; border-radius: 11px; font: inherit; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 6px 16px rgba(255,96,52,.28); }
  .btn-primary:hover { filter: brightness(1.04); }
  .btn-ghost { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .hint-line { color: var(--orange); font-size: 12.5px; margin: 9px 4px 0; min-height: 16px; }
  .grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; align-items: start; }
  @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
    margin: 4px 2px 12px; display: flex; justify-content: space-between; }
  .section-title .count { color: var(--accent); }
  .wcard { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex;
    align-items: center; gap: 12px; cursor: pointer; margin-bottom: 12px; box-shadow: var(--shadow); transition: border-color .15s; }
  .wcard:hover { border-color: var(--accent-2); }
  .wdel { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 7px; display: grid; place-items: center;
    color: var(--muted-2); background: #fff; border: 1px solid var(--border); cursor: pointer; opacity: 0; transition: opacity .12s, color .12s, border-color .12s; }
  .wcard:hover .wdel { opacity: 1; }
  .wdel:hover { color: var(--red); border-color: #f3b4b4; background: #fdecec; }
  .wcard.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .avatar { width: 42px; height: 42px; border-radius: 50%; flex: 0 0 42px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px; }
  .wcard .info { flex: 1; min-width: 0; }
  .wcard .info .nm { font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .wcard .info .ad { color: var(--muted); font-size: 12px; }
  .wcard .bal { text-align: right; }
  .wcard .bal .v { font-weight: 800; }
  .wcard .bal .s { color: var(--muted); font-size: 11px; }
  .chip { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 6px; text-transform: uppercase; background: var(--accent-soft); color: var(--accent); letter-spacing: .4px; }
  .x { margin-left: 6px; color: var(--muted-2); font-size: 12px; padding: 2px 6px; border-radius: 6px; }
  .x:hover { color: var(--red); background: #fdecec; }
  .empty { color: var(--muted); text-align: center; padding: 30px 12px; background: var(--card); border: 1px dashed var(--border); border-radius: 14px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
  .det-head { display: flex; align-items: center; gap: 14px; padding: 20px; border-bottom: 1px solid var(--border); }
  .det-head .info { flex: 1; min-width: 0; }
  .det-head .nm { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .det-head .ad { color: var(--muted); font-size: 12.5px; word-break: break-all; }
  .copy-ic { cursor: pointer; color: var(--muted-2); margin-left: 6px; display: inline-flex; vertical-align: middle; }
  .copy-ic:hover { color: var(--accent); }
  .det-head .total { text-align: right; }
  .det-head .total .big { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
  .det-head .total .sub { font-size: 12px; color: var(--muted); }
  .chain-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: #fafbfd; align-items: center; }
  .chain-tab { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 8px; cursor: pointer; color: var(--muted); border: 1px solid var(--border); background: #fff; }
  .chain-tab:hover { border-color: var(--accent-2); color: var(--accent); }
  .chain-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chain-tab .u { font-weight: 800; margin-left: 4px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
  @media (max-width: 620px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--card); padding: 16px 18px; }
  .stat .k { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .stat .v { font-size: 20px; font-weight: 800; margin-top: 3px; }
  .stat .v small { font-size: 12px; color: var(--muted); font-weight: 600; }
  .help { color: var(--muted-2); cursor: help; border: 1px solid var(--border); border-radius: 50%; width: 14px; height: 14px; display: inline-grid; place-items: center; font-size: 10px; }
  .tabs { display: flex; gap: 4px; padding: 12px 18px 0; border-bottom: 1px solid var(--border); }
  .tab { padding: 9px 14px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tabbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; padding-bottom: 8px; color: var(--muted); font-size: 12px; }
  .switch { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .refresh-btn { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 10px 18px; border-bottom: 1px solid var(--border); font-weight: 700; }
  td { padding: 13px 18px; border-bottom: 1px solid #f3f4f7; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafd; }
  .badge { font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 8px; white-space: nowrap; }
  .b-BUY { color: var(--green); background: rgba(46,189,133,.12); }
  .b-SELL { color: var(--red); background: rgba(232,83,75,.12); }
  .b-SWAP { color: var(--swap); background: rgba(139,92,246,.12); }
  .b-TRANSFER_IN { color: var(--blue); background: rgba(59,130,246,.12); }
  .b-TRANSFER_OUT { color: var(--orange); background: rgba(245,166,35,.14); }
  .b-OTHER { color: var(--muted); background: #f0f1f4; }
  .b-open-long { color: var(--green); background: rgba(46,189,133,.12); }
  .b-close-long { color: var(--orange); background: rgba(245,166,35,.16); }
  .b-open-short { color: var(--red); background: rgba(232,83,75,.12); }
  .b-close-short { color: var(--blue); background: rgba(59,130,246,.12); }
  .usd { color: var(--muted); font-weight: 600; }
  .amt-cell { font-weight: 700; white-space: nowrap; }
  .t-time { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .pf-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #f3f4f7; }
  .pf-row:last-child { border-bottom: none; }
  .coin { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 11px; flex: 0 0 32px; }
  .pf-row .sym { font-weight: 700; flex: 1; min-width: 0; }
  .pf-row .sym .sub2 { color: var(--muted); font-size: 12px; font-weight: 500; }
  .pf-row .amt { text-align: right; }
  .pf-row .amt .v { font-weight: 800; }
  .pf-row .amt .u { color: var(--muted); font-size: 12px; }
  .summary-block { border-bottom: 8px solid var(--bg); }
  .summary-head { padding: 11px 18px; font-weight: 700; color: var(--muted); font-size: 12px; letter-spacing: .4px; background: #fafbfd; border-bottom: 1px solid var(--border); }
  .hl-block { border-bottom: 8px solid var(--bg); }
  .hl-head { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px; font-weight: 800; background: #eefaf6; border-bottom: 1px solid var(--border); }
  .hl-head .hl-val { color: var(--muted); font-weight: 700; font-size: 13px; }
  .th-filter { font: inherit; font-size: 11px; padding: 1px 3px; border: 1px solid var(--border); border-radius: 5px; background: #fff; color: var(--muted); cursor: pointer; margin-left: 3px; max-width: 88px; vertical-align: middle; }
  .th-sort { cursor: pointer; color: var(--muted-2); margin-left: 4px; user-select: none; font-size: 12px; }
  .th-sort:hover, .th-sort.on { color: var(--accent); }
  .scroll-area { max-height: 520px; overflow-y: auto; }
  .scroll-sm { max-height: 340px; overflow-y: auto; }
  .scroll-area th, .scroll-sm th { position: sticky; top: 0; background: #fff; z-index: 1; }
  .note { color: var(--muted); font-size: 12.5px; padding: 16px 18px; }
  .spinner { color: var(--muted); padding: 26px; text-align: center; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid var(--border);
    padding: 11px 18px; border-radius: 12px; box-shadow: var(--shadow); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 50; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="mark">P</span> Pocket <small>· 链上钱包跟踪</small></div>
    <div class="hint mono" id="chainStatus"></div>
  </header>
  <div class="container">
    <div class="hero">
      <div class="search">
        <span class="ic">🔍</span>
        <input id="address" placeholder="粘贴任意钱包地址，自动识别链（0x… / Solana / bc1…）" autocomplete="off"
               oninput="onAddrInput()" onkeydown="if(event.key==='Enter')queryAddress(false)" />
        <span class="detect" id="detect">等待输入</span>
        <button class="btn-ghost" onclick="queryAddress(false)">查询</button>
        <button class="btn-primary" onclick="queryAddress(true)">+ 跟踪</button>
      </div>
      <div class="hint-line" id="addrHint"></div>
    </div>
    <div class="grid">
      <div>
        <div class="section-title">跟踪清单 <span class="count" id="wcount"></span></div>
        <div id="walletList"><div class="spinner">加载中…</div></div>
      </div>
      <div class="panel" id="detail">
        <div class="empty" style="margin:0;border:none">粘贴一个钱包地址并点「查询」，或从左侧选择已跟踪的钱包。</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
<script>
const EVM_CHAINS = ["eth","bsc","base","arb","polygon","op"];
const TYPE_LABEL = {BUY:"买入",SELL:"卖出",SWAP:"兑换",TRANSFER_IN:"转入",TRANSFER_OUT:"转出",OTHER:"其他"};
const CAT_LABEL = {evm:"EVM",sol:"Solana",btc:"Bitcoin"};
const DIR_LABEL = {"Open Long":"开多","Close Long":"平多","Open Short":"开空","Close Short":"平空","Buy":"买入","Sell":"卖出"};
function dirCN(d){ if(!d) return ""; if(DIR_LABEL[d]) return DIR_LABEL[d];
  return d.replace(/Open/gi,"开").replace(/Close/gi,"平").replace(/Long/gi,"多").replace(/Short/gi,"空").replace(/Buy/gi,"买入").replace(/Sell/gi,"卖出"); }
const TOKEN = localStorage.getItem("wt_token") || "";
let CHAINS = [], MORALIS = false;
let sel = null;           // {chain,address,label,category}
let activeTab = "tx", hideSpam = true, onlyTrades = true, chainFilter = null;
let typeFilter = "", coinFilter = "", sortKey = "", sortDir = "desc";  // 动作流列筛选/排序
let timer = null, autoOn = true;
let cache = { port:null, bal:null, hist:null, pnl:null, swaps:null, hl:null, updated:0 };
let cardCache = {};   // 卡片总值/浮盈缓存，避免每次选钱包都重打所有接口
let detailCache = {}; // 详情数据快照，切换回最近看过的钱包时秒开
function detailKey(s){ return s ? s.chain+":"+s.address+":"+s.category : ""; }

function hdrs(){ return TOKEN ? {"X-Auth-Token":TOKEN,"Content-Type":"application/json"} : {"Content-Type":"application/json"}; }
async function api(path, opts={}){
  const r = await fetch(path,{headers:hdrs(),...opts});
  if(r.status===401){ const t=prompt("需要访问令牌 (WEB_TOKEN):"); if(t){localStorage.setItem("wt_token",t);location.reload();} throw new Error("unauthorized"); }
  if(!r.ok){ const e=await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||"error"); }
  return r.json();
}
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2300); }
const COPY_SVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
function copyBtn(text){ return `<span class="copy-ic" title="复制地址" onclick="copyText('${text}',event)">${COPY_SVG}</span>`; }
const TRASH_SVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"/></svg>';
function copyText(t, ev){ if(ev) ev.stopPropagation();
  const done=()=>toast("已复制地址");
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done));
  else fallbackCopy(t,done);
}
function fallbackCopy(t,done){ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");done();}catch(e){} document.body.removeChild(ta); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function shortAddr(a,h=6,t=4){ return a.length<=h+t+1?a:a.slice(0,h)+"…"+a.slice(-t); }
const _D2={minimumFractionDigits:2,maximumFractionDigits:2};
function fmt(x){ x=+x||0; const a=Math.abs(x); if(a>=1e9) return (x/1e9).toFixed(2)+"B"; if(a>=1e6) return (x/1e6).toFixed(2)+"M"; return x.toLocaleString(undefined,_D2); }
function usd(x){ if(x==null) return "—"; const s=x<0?"-":""; const a=Math.abs(x); if(a>=1e9) return s+"$"+(a/1e9).toFixed(2)+"B"; if(a>=1e6) return s+"$"+(a/1e6).toFixed(2)+"M"; return s+"$"+a.toLocaleString(undefined,_D2); }
function price(x){ if(x==null) return "—"; const a=Math.abs(x); if(a>=1) return "$"+x.toLocaleString(undefined,_D2); if(a===0) return "$0.00"; return "$"+(+x.toPrecision(2)); }
function ago(ts){ if(!ts) return ""; const s=Math.floor(Date.now()/1000-ts); if(s<60)return s+"s"; if(s<3600)return Math.floor(s/60)+"m"; if(s<86400)return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d"; }
function fmtDate(ts){ if(!ts) return ""; const d=new Date(ts*1000); const p=n=>String(n).padStart(2,'0');
  const mo=p(d.getMonth()+1),da=p(d.getDate()),h=p(d.getHours()),mi=p(d.getMinutes());
  const yr=d.getFullYear()===new Date().getFullYear()?'':d.getFullYear()+'-';
  return yr+`${mo}-${da} ${h}:${mi}`; }
function hashHue(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%360; }
function avatarStyle(a){ const h=hashHue(a||""); return `background:linear-gradient(135deg,hsl(${h},75%,58%),hsl(${(h+50)%360},75%,52%))`; }

async function loadChains(){
  const d = await api("/api/chains"); CHAINS=d.chains; MORALIS=!!d.moralis;
  const ok = CHAINS.filter(c=>c.usable && !c.reason).map(c=>c.id.toUpperCase());
  document.getElementById("chainStatus").textContent = "可用链: " + (ok.join(" · ")||"仅 BTC") + (MORALIS?"":" · 持仓未启用");
}
function chainUsable(id){ const c=CHAINS.find(x=>x.id===id); return c&&c.usable; }
function firstUsableEvm(){ return EVM_CHAINS.find(chainUsable) || "eth"; }
function anyEvmUsable(){ return EVM_CHAINS.some(chainUsable); }

function detectCategory(addr){
  addr=addr.trim(); if(!addr) return null;
  if(/^0x[0-9a-fA-F]{40}$/.test(addr)) return "evm";
  if(/^(bc1|tb1)[0-9a-z]{8,}$/i.test(addr)) return "btc";
  if(/^[13][a-km-zA-HJ-NP-Z1-9]{24,34}$/.test(addr)) return "btc";
  if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(addr)) return "sol";
  return null;
}
function onAddrInput(){
  const v=document.getElementById("address").value.trim();
  const chip=document.getElementById("detect"), hint=document.getElementById("addrHint");
  const cat=detectCategory(v);
  if(!v){ chip.textContent="等待输入"; chip.className="detect"; hint.textContent=""; return; }
  if(!cat){ chip.textContent="无法识别"; chip.className="detect"; hint.textContent=""; return; }
  chip.textContent="识别：" + CAT_LABEL[cat] + (cat==="evm"?"（多链聚合）":""); chip.className="detect ok";
  hint.textContent = (cat==="evm" && !anyEvmUsable()) ? "⚠️ 这是 EVM 地址，请在 .env 配置免费的 ETHERSCAN_API_KEY。" : "";
}

async function loadWallets(){
  const d=await api("/api/wallets");
  document.getElementById("wcount").textContent = d.wallets.length?"("+d.wallets.length+")":"";
  const list=document.getElementById("walletList");
  if(!d.wallets.length){ list.innerHTML='<div class="empty" style="border-style:dashed">还没有跟踪任何钱包<br><span style="font-size:12px;color:var(--muted-2)">上方粘贴地址后点「+ 跟踪」</span></div>'; return; }
  list.innerHTML=d.wallets.map(w=>{
    const active=sel&&sel.chain===w.chain&&sel.address===w.address;
    const initial=(w.label||w.address).slice(0,1).toUpperCase();
    return `<div class="wcard ${active?"active":""}" data-key="${w.chain}:${w.address}" onclick='selectWallet(${JSON.stringify(w).replace(/'/g,"&#39;")})'>
      <div class="avatar" style="${avatarStyle(w.address)}">${esc(initial)}</div>
      <div class="info"><div class="nm">${esc(w.label||shortAddr(w.address))} <span class="chip">${EVM_CHAINS.includes(w.chain)?"EVM":w.chain}</span></div>
        <div class="ad mono">${shortAddr(w.address,8,6)}${copyBtn(w.address)}</div></div>
      <div class="bal"><div class="v" id="wbal-${w.id}">—</div><div class="s" id="wpnl-${w.id}">总值</div></div>
      <div class="wdel" title="移除跟踪" onclick='event.stopPropagation();removeWallet(${w.id})'>${TRASH_SVG}</div></div>`;
  }).join("");
  // 串行填充各卡片总值/浮盈，避免一次性并发把免费接口打到限流
  (async()=>{ for(const w of d.wallets){ await fillCard(w); } })();
}

async function fillCard(w){
  const el=document.getElementById("wbal-"+w.id); if(!el) return;
  const pel=document.getElementById("wpnl-"+w.id);
  const key=w.chain+":"+w.address;
  const c=cardCache[key];
  if(c && Date.now()-c.ts<60000){ el.textContent=c.text; if(pel) pel.innerHTML=c.pnl; return; }
  try{
    if(EVM_CHAINS.includes(w.chain)){
      let total=0, have=false, upnl=0, pnlType='';
      if(MORALIS){ try{ const n=await api(`/api/networth?address=${w.address}`); total+=n.total_usd; have=true; }catch(e){} }
      try{ const hh=await api(`/api/hyperliquid?address=${w.address}&fills=1`); if(hh){ if(hh.total_usd){ total+=hh.total_usd; have=true; }
        if(hh.unrealized_pnl){ upnl=hh.unrealized_pnl; pnlType='浮'; } else if(hh.realized_pnl){ upnl=hh.realized_pnl; pnlType='实'; } } }catch(e){}
      let text;
      if(have){ text=usd(total); el.textContent=text; }
      else { const b=await api(`/api/balance?chain=${w.chain}&address=${encodeURIComponent(w.address)}`); text=fmt(b.native_amount)+" "+b.native_symbol; el.textContent=text; }
      const pnl = upnl ? `<span class="${upnl>=0?'pos':'neg'}">${pnlType} ${(upnl>=0?'+':'')+usd(upnl)}</span>` : "总值";
      if(pel) pel.innerHTML=pnl;
      cardCache[key]={text, pnl, ts:Date.now()};
    } else {
      const b=await api(`/api/balance?chain=${w.chain}&address=${encodeURIComponent(w.address)}`);
      const text=b.extra&&b.extra.total_usd!=null?usd(b.extra.total_usd):fmt(b.native_amount)+" "+b.native_symbol;
      el.textContent=text; cardCache[key]={text, pnl:"总值", ts:Date.now()};
    }
  }catch(e){ el.textContent="—"; }
}

async function loadAll(cur){
  cur=cur||sel; if(!cur) return; const tag=JSON.stringify(cur);
  const isEvm = cur.category==="evm", isEvmM = isEvm && MORALIS;
  const addr=encodeURIComponent(cur.address);
  if(isEvmM){
    cache.bal=null;
    // HL 与持仓并发起飞；持仓先到即渲染，随后只对有余额的链查买卖
    const pHl=api(`/api/hyperliquid?address=${addr}&fills=1`).then(d=>cache.hl=d).catch(()=>cache.hl=null);
    try{ cache.port=await api(`/api/portfolio?address=${addr}`); }catch(e){ cache.port={__err:e.message}; }
    if(JSON.stringify(sel)!==tag) return;
    cache.updated=Date.now(); renderDetail();
    await Promise.all([ pHl, loadStreamInto(cur) ]);
  } else {
    cache.port=null;
    const tasks=[ api(`/api/balance?chain=${cur.chain}&address=${addr}`).then(d=>cache.bal=d).catch(e=>cache.bal={__err:e.message}) ];
    if(isEvm){ tasks.push(api(`/api/hyperliquid?address=${addr}&fills=1`).then(d=>cache.hl=d).catch(e=>cache.hl=null)); } else cache.hl=null;
    tasks.push(loadStreamInto(cur));
    await Promise.all(tasks);
  }
  if(JSON.stringify(sel)!==tag) return;
  cache.updated=Date.now(); renderDetail();
  detailCache[detailKey(cur)]={ snap:{port:cache.port,bal:cache.bal,hist:cache.hist,pnl:cache.pnl,swaps:cache.swaps,hl:cache.hl}, ts:Date.now() };
}
async function loadStreamInto(cur){
  if(cur.category==="evm" && MORALIS){
    cache.hist=null; cache.pnl=null;
    const ac=activeChains().join(",");  // 只查有余额/常用的链
    try{ cache.swaps=await api(`/api/swaps?address=${encodeURIComponent(cur.address)}&chains=${ac}&limit=20`); }
    catch(e){ cache.swaps={__err:e.message}; }
    return;
  }
  cache.swaps=null;
  const q=`chain=${cur.chain}&address=${encodeURIComponent(cur.address)}`;
  const [h,p]=await Promise.allSettled([api(`/api/history?${q}&limit=40`), api(`/api/pnl?${q}&limit=50`)]);
  cache.hist=h.status==="fulfilled"?h.value:{__err:h.reason?.message};
  cache.pnl=p.status==="fulfilled"?p.value:{available:false};
}
async function refreshStream(){ const cur=sel; if(!cur) return; const tag=JSON.stringify(cur);

// 按币种汇总成交，并结合当前持仓/现价计算浮动盈亏(HL 用真实值，EVM 用现价估算)
function coinRollup(list){
  const m={};
  (list||[]).forEach(t=>{
    const k=t.token_symbol||'?';
    const g=m[k]||(m[k]={coin:k,buys:0,sells:0,buyAmt:0,sellAmt:0,buyVal:0,sellVal:0,realized:0,venue:''});
    if(!g.venue) g.venue=t.venue||'';
    if(t.type==="BUY"){ g.buys++; g.buyAmt+=t.token_amount; g.buyVal+=t.value_usd; }
    else { g.sells++; g.sellAmt+=t.token_amount; g.sellVal+=t.value_usd; }
    if(t.closed_pnl!=null) g.realized+=t.closed_pnl;
  });
  const pos={}; ((cache.hl&&cache.hl.positions)||[]).forEach(p=>pos[p.coin]=p);
  const portMap={}; ((cache.port&&cache.port.tokens)||[]).forEach(t=>{ portMap[(t.symbol||'').toUpperCase()]=t; });
  Object.keys(pos).forEach(c=>{ if(!m[c]) m[c]={coin:c,buys:0,sells:0,buyAmt:0,sellAmt:0,buyVal:0,sellVal:0,realized:0,venue:'HL'}; });
  const rows=Object.values(m).map(g=>{
    const p=pos[g.coin]; const pt=portMap[(g.coin||'').toUpperCase()];
    const avg = p ? p.entry_px : (g.buyAmt>0 ? g.buyVal/g.buyAmt : null);
    let cur=null, posVal=null, upnl=null, isHL=false, side='';
    if(p){ isHL=true; side=p.side; cur=(p.size? p.value_usd/Math.abs(p.size) : p.entry_px); posVal=p.value_usd; upnl=p.unrealized_pnl; }
    else if(pt){ cur=(pt.price!=null?pt.price:null); posVal=(pt.usd_value!=null?pt.usd_value:null);
      if(avg!=null && cur!=null && pt.amount) upnl=(cur-avg)*pt.amount; }  // EVM 浮盈估算=(现价-买入均价)×持仓
    const venue = isHL ? 'HL' : (g.venue || (pt?pt.chain:'') || '');
    return { coin:g.coin, buys:g.buys, sells:g.sells, net:g.buyAmt-g.sellAmt, realized:g.realized, avg, cur, posVal, upnl, isHL, side, venue };
  });
  rows.sort((a,b)=> (Math.abs(b.posVal||0)+b.buys+b.sells) - (Math.abs(a.posVal||0)+a.buys+a.sells));
  return rows;
}

function tradeBadge(s){
  const d=s.dir||"";
  if(/open\s*long/i.test(d)) return {t:"开多",c:"b-open-long"};
  if(/close\s*long/i.test(d)) return {t:"平多",c:"b-close-long"};
  if(/open\s*short/i.test(d)) return {t:"开空",c:"b-open-short"};
  if(/close\s*short/i.test(d)) return {t:"平空",c:"b-close-short"};
  return s.type==="BUY" ? {t:"买入",c:"b-BUY"} : {t:"卖出",c:"b-SELL"};
}
function renderTrades(list, err){
  if(!list || !list.length){
    if(err) return `<div class="note">买卖查询失败：${esc(err)}</div>`;
    return `<div class="note">该钱包近期没有买卖记录${chainFilter?`（${chainFilter==='HL'?'Hyperliquid':chainFilter.toUpperCase()}）`:"（EVM DEX 与 Hyperliquid 均无）"}。</div>`;
  }
  const types=[...new Set(list.map(s=>tradeBadge(s).t))];
  const coins=[...new Set(list.map(s=>s.token_symbol||'?'))];
  let shown=list.slice();
  if(typeFilter) shown=shown.filter(s=>tradeBadge(s).t===typeFilter);
  if(coinFilter) shown=shown.filter(s=>(s.token_symbol||'?')===coinFilter);
  if(sortKey){ const k={amount:'token_amount',price:'price_usd',value:'value_usd',time:'timestamp'}[sortKey];
    shown.sort((a,b)=>{ const av=+a[k]||0, bv=+b[k]||0; return sortDir==='desc'?bv-av:av-bv; }); }

  const selBox=(cur,onCh,items)=>`<select class="th-filter" onchange="${onCh}(this.value)"><option value="">全部</option>${items.map(t=>`<option value="${esc(t)}" ${cur===t?'selected':''}>${esc(t)}</option>`).join("")}</select>`;
  const sortBtn=(k)=>`<span class="th-sort ${sortKey===k?'on':''}" onclick="setSort('${k}')">${sortKey===k?(sortDir==='desc'?'↓':'↑'):'⇅'}</span>`;

  const rows=shown.map(s=>{
    const bd=tradeBadge(s);
    const venueChip = s.venue==='HL'
      ? `<span class="chip" title="Hyperliquid 永续/现货成交">⚡HL</span>`
      : `<span class="chip">${(s.venue||s.chain||'').toUpperCase()}</span>`;
    const pnl = (s.closed_pnl!=null && s.closed_pnl!==0) ? ` · <span class="${s.closed_pnl>=0?'pos':'neg'}">${(s.closed_pnl>=0?'+':'')+usd(s.closed_pnl)}</span>` : '';
    return `<tr>
      <td><span class="badge ${bd.c}">${bd.t}</span></td>
      <td><b>${esc(s.token_symbol)}</b> ${venueChip}</td>
      <td class="amt-cell">${fmt(s.token_amount)}</td>
      <td>${price(s.price_usd)}</td>
      <td class="amt-cell">${usd(s.value_usd)}${pnl}</td>
      <td class="t-time" title="${ago(s.timestamp)}前">${fmtDate(s.timestamp)}</td>
      <td>${s.explorer_url?`<a href="${s.explorer_url}" target="_blank" rel="noopener">↗</a>`:""}</td></tr>`;
  }).join("");
  const tbody = rows || `<tr><td colspan="7" class="note">无符合筛选的记录</td></tr>`;
  return `<div class="scroll-area"><table><thead><tr>
    <th>类型 ${selBox(typeFilter,'setTypeFilter',types)}</th>
    <th>币种/来源 ${selBox(coinFilter,'setCoinFilter',coins)}</th>
    <th>数量 ${sortBtn('amount')}</th>
    <th>价格 ${sortBtn('price')}</th>
    <th>金额(USD) ${sortBtn('value')}</th>
    <th>时间 ${sortBtn('time')}</th>
    <th></th></tr></thead><tbody>${tbody}</tbody></table></div>`;
}

function renderPortfolioMoralis(port){
  if(!port||port.__err) return `<div class="note">持仓查询失败：${esc(port&&port.__err||"未知错误")}（可在 .env 配置 MORALIS_API_KEY）</div>`;
  if(!port.tokens||!port.tokens.length) return `<div class="note">未发现有价值的代币持仓（垃圾币已过滤）。</div>`;
  const rows=port.tokens.slice(0,80).map(t=>`<div class="pf-row">
    <div class="coin" style="${avatarStyle(t.symbol+(t.contract||''))}">${esc((t.symbol||'?').slice(0,3))}</div>
    <div class="sym">${esc(t.symbol||'?')} <span class="chip">${t.chain}</span>
      <div class="sub2">${fmt(t.amount)}${t.price?` · ${price(t.price)}`:""}</div></div>
    <div class="amt"><div class="v">${usd(t.usd_value)}</div></div></div>`).join("");
  const more = port.tokens.length>80 ? `<div class="note">仅显示前 80 个，共 ${port.tokens.length} 个。</div>` : "";
  return rows + more;
}
function renderBalance(b){
  if(!b||b.__err) return `<div class="note">余额查询失败：${esc(b&&b.__err||"未知错误")}</div>`;
  const price=b.extra&&b.extra.native_price;
  let rows=`<div class="pf-row"><div class="coin" style="${avatarStyle(b.native_symbol)}">${esc(b.native_symbol.slice(0,3))}</div>
    <div class="sym">${esc(b.native_symbol)} <span style="color:var(--muted);font-weight:500">原生币</span><div class="sub2">${fmt(b.native_amount)}</div></div>
    <div class="amt"><div class="v">${b.extra&&b.extra.native_usd!=null?usd(b.extra.native_usd):(price?usd(b.native_amount*price):"—")}</div></div></div>`;
  (b.tokens||[]).forEach(t=>{ rows+=`<div class="pf-row"><div class="coin" style="${avatarStyle(t.symbol+(t.contract||''))}">${esc(t.symbol.slice(0,3))}</div>
    <div class="sym">${esc(t.symbol)}<div class="sub2">${fmt(t.amount)}</div></div>
    <div class="amt"><div class="v">${["USDC","USDT","DAI","BUSD"].includes(t.symbol.toUpperCase())?usd(t.amount):"—"}</div></div></div>`; });
  return rows + (b.extra&&b.extra.note?`<div class="note">${esc(b.extra.note)}</div>`:"");
}
function renderHistory(h){
  if(!h||h.__err) return `<div class="note">交易查询失败：${esc(h&&h.__err||"未知错误")}</div>`;
  if(h.note) return `<div class="note">${esc(h.note)}</div>`;
  let acts=h.actions||[];
  const spam=new Set((cache.port&&cache.port.spam_contracts)||[]);
  if(hideSpam && spam.size) acts=acts.filter(a=>!(a.token_contract&&spam.has(a.token_contract)));
  if(onlyTrades) acts=acts.filter(a=>a.type==="BUY"||a.type==="SELL");
  if(!acts.length) return `<div class="note">${onlyTrades?"近期无买卖记录（取消勾选「只看买卖」可看全部动作）":"暂无可解析的交易记录"}。</div>`;
  const rows=acts.map(a=>`<tr>
    <td><span class="badge b-${a.type}">${TYPE_LABEL[a.type]||a.type}</span></td>
    <td>${esc(a.summary)}</td>
    <td class="amt-cell">${a.value_usd!=null?`<span class="usd">≈</span>${usd(a.value_usd)}`:"—"}</td>
    <td class="t-time" title="${ago(a.timestamp)}前">${fmtDate(a.timestamp)}</td>
    <td><a href="${a.explorer_url}" target="_blank" rel="noopener">↗</a></td></tr>`).join("");
  return `<table><thead><tr><th>类型</th><th>详情（币种·数量·计价）</th><th>金额(USD)</th><th>时间</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}
function switchTab(t){ activeTab=t; renderDetail(); }

(async function init(){
  try{ await loadChains(); await loadWallets(); onAddrInput(); }
  catch(e){ document.getElementById("walletList").innerHTML=`<div class="empty">加载失败：${esc(e.message)}</div>`; }
})();
</script>
